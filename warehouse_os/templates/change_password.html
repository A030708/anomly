{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block header_title %}Change Password{% endblock %}
{% block content %}

<div style="max-width: 450px;">
  <form method="POST" class="wos-card" style="padding: 24px; display: flex; flex-direction: column; gap: 16px;">
    <div>
      <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px;">Current Password</label>
      <input type="password" name="current_password" required style="width: 100%; padding: 8px 12px; border: 1px solid var(--wos-border); border-radius: var(--wos-radius-md); font-family: inherit; font-size: 14px; outline: none;">
    </div>
    <div>
      <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px;">New Password</label>
      <input type="password" name="new_password" required style="width: 100%; padding: 8px 12px; border: 1px solid var(--wos-border); border-radius: var(--wos-radius-md); font-family: inherit; font-size: 14px; outline: none;">
    </div>
    <div>
      <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px;">Confirm New Password</label>
      <input type="password" name="confirm_password" required style="width: 100%; padding: 8px 12px; border: 1px solid var(--wos-border); border-radius: var(--wos-radius-md); font-family: inherit; font-size: 14px; outline: none;">
    </div>
    <button type="submit" class="wos-btn wos-btn-primary" style="width: 100%; padding: 12px; font-size: 15px;">
      <i class="fa-solid fa-key"></i> Change Password
    </button>
  </form>
</div>

{% endblock %}
