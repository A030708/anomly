{% extends "base.html" %}
{% block title %}Reset Password - BoltMart{% endblock %}
{% block content %}

<div style="max-width: 400px; margin: 60px auto;">
    <div class="bm-card" style="padding: 40px; text-align: center;">
        <div style="font-size: 48px; margin-bottom: 16px;">&#128274;</div>
        <h2 style="margin-top: 0; color: var(--bm-primary);">Reset Password</h2>

        {% if error %}
        <div class="bm-alert" style="background:#fff5f5; color:#e53e3e; border-left:4px solid #e53e3e; padding:12px; margin-bottom: 20px;">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <p style="color: var(--bm-text-muted); margin-bottom: 24px;">
            Enter the code sent to your email and set a new password.
        </p>

        <form method="POST">
            <input type="hidden" name="email" value="{{ email }}">
            <div class="bm-form-group">
                <label class="bm-label">Reset Code</label>
                <input type="text" name="code" class="bm-input" placeholder="6-digit code" required style="text-align: center; letter-spacing: 4px; font-size: 20px;">
            </div>
            <div class="bm-form-group">
                <label class="bm-label">New Password</label>
                <input type="password" name="new_password" class="bm-input" placeholder="Min 6 characters" required minlength="6">
            </div>
            <div class="bm-form-group">
                <label class="bm-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="bm-input" placeholder="Re-enter new password" required minlength="6">
            </div>
            <button type="submit" class="bm-btn bm-btn-primary" style="width: 100%;">Reset Password</button>
        </form>

        <p style="margin-top: 20px;">
            <a href="{{ url_for('login') }}" class="bm-nav-link" style="font-size: 14px;">Back to Login</a>
        </p>
    </div>
</div>

{% endblock %}
