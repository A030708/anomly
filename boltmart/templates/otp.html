{% extends "base.html" %}

{% block title %}Verify OTP - BoltMart{% endblock %}

{% block content %}
<div class="bm-card" style="max-width: 400px; margin: 40px auto; padding: 30px; text-align: center;">
    <h2 style="margin-top:0; color:var(--bm-primary);">Verify Login</h2>
    <p style="color:var(--bm-muted); margin-bottom:20px;">
        For your security, we've sent a 6-digit OTP to your email.
    </p>

    {% if dev_otp %}
    <div style="background:#f0f5ff; border:2px dashed #1a56db; border-radius:12px; padding:16px; margin:16px auto; max-width:220px;">
        <p style="font-size:13px; color:#6b7280; margin:0 0 4px;">Dev mode: OTP</p>
        <p style="font-size:32px; font-weight:800; color:#1a56db; letter-spacing:6px; margin:0;">{{ dev_otp }}</p>
    </div>
    {% endif %}

    {% if error %}
    <div class="bm-alert" style="background:#fff5f5; color:#e53e3e; border-left:4px solid #e53e3e; padding:12px; margin-bottom:20px;">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('verify_otp_route') }}">
        <input type="hidden" name="email" value="{{ email }}">
        
        <div class="bm-form-group">
            <input type="text" name="code" class="bm-input" placeholder="Enter 6-digit code" required style="text-align:center; font-size:18px; letter-spacing:2px;" autocomplete="off">
        </div>
        
        <button type="submit" class="bm-btn bm-btn-primary" style="width: 100%;">Verify</button>
    </form>
</div>
{% endblock %}
